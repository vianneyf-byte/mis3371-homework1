<!DOCTYPE html>
<!--
Program name: patient-form.html
Author: Vianney Figueroa
Date created: 06/18/2026
Date last edited: 06/20/2026
Version: 1.0
Description: A registration form for new patients at Space City Medical.-->
<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <div><img src="hospital-icon.svg" alt="space city hospital logo" class="logo" ></div>
            <div><h1 class="title"> Space City Medical </h1></div>
            <div><h3>Today is: <script>document.write(new Date().toDateString());</script></h3></div>
        </header>
        <main>
            <form>
                <h2 class="formtitle">Registration Form</h2>
                <label for="userid">Username:</label><br>
                <input name="userid" type="text"  maxlength="20" required><br>
                <label for="password">Password:</label><br>
                <input name="password" type="password"  required><br>
                <label for="confirm_password">Confirm Password:</label><br>
                <input name="confirm_password" type="password" required><br>
                <label for="fname">First Name</label>
                <label for="mname">/ MI /</label>
                <label for="lname"> Last Name:</label><br>
                <input name="fname" class="mediuminput" type="text" maxlength="30" required>
                <input name="mname" class="initial" type="text" maxlength="1">
                <input name="lname" class="mediuminput" type="text" maxlength="30" required><br>
                <label>Date of Birth:</label><br>
                <input name = "dob" type="text" pattern="(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/\d{4}" title="Use MM/DD/YYYY format" required><br>
                <label>Social Security:</label><br>
                <input name = "ssn" type="password" minlength="9" maxlength="11"><br>
                <label>Adress Line 1:</label><br>
                <input name = "address1" type="text" maxlength="30"><br>
                <label>Adress Line 2:</label><br>
                <input name = "address2" type="text" maxlength="30"><br>
                <label>City /</label>
                <label> State /</label>
                <label> ZipCode:</label><br>
                <input name = "city" class="mediuminput" type="text" maxlength="30">
                <select name="states">
                    <option value="AL">Alabama</option>
                    <option value="AK">Alaska</option>
                    <option value="AZ">Arizona</option>
                    <option value="AR">Arkansas</option>
                    <option value="CA">California</option>
                    <option value="CO">Colorado</option>
                    <option value="CT">Connecticut</option>
                    <option value="DE">Delaware</option>
                    <option value="DC">District Of Columbia</option>
                    <option value="FL">Florida</option>
                    <option value="GA">Georgia</option>
                    <option value="HI">Hawaii</option>
                    <option value="ID">Idaho</option>
                    <option value="IL">Illinois</option>
                    <option value="IN">Indiana</option>
                    <option value="IA">Iowa</option>
                    <option value="KS">Kansas</option>
                    <option value="KY">Kentucky</option>
                    <option value="LA">Louisiana</option>
                    <option value="ME">Maine</option>
                    <option value="MD">Maryland</option>
                    <option value="MA">Massachusetts</option>
                    <option value="MI">Michigan</option>
                    <option value="MN">Minnesota</option>
                    <option value="MS">Mississippi</option>
                    <option value="MO">Missouri</option>
                    <option value="MT">Montana</option>
                    <option value="NE">Nebraska</option>
                    <option value="NV">Nevada</option>
                    <option value="NH">New Hampshire</option>
                    <option value="NJ">New Jersey</option>
                    <option value="NM">New Mexico</option>
                    <option value="NY">New York</option>
                    <option value="NC">North Carolina</option>
                    <option value="ND">North Dakota</option>
                    <option value="OH">Ohio</option>
                    <option value="OK">Oklahoma</option>
                    <option value="OR">Oregon</option>
                    <option value="PA">Pennsylvania</option>
                    <option value="PR">Puerto Rico</option>
                    <option value="RI">Rhode Island</option>
                    <option value="SC">South Carolina</option>
                    <option value="SD">South Dakota</option>
                    <option value="TN">Tennessee</option>
                    <option value="TX">Texas</option>
                    <option value="UT">Utah</option>
                    <option value="VT">Vermont</option>
                    <option value="VA">Virginia</option>
                    <option value="WA">Washington</option>
                    <option value="WV">West Virginia</option>
                    <option value="WI">Wisconsin</option>
                    <option value="WY">Wyoming</option>
                </select>
                <input name = "zip" class="small-input" type="text" minlength="5" maxlength="10"><br>
                <label>Email:</label><br>
                <input name = "email" type="email" required><br>
                <label>What kind of visit?:</label><br>
                    <input name = "visit_type" type="checkbox" id="emergency">
                    <text for="emergency">Emergency</text>
                    <input name = "visit_type" type="checkbox" id="nonemergency">
                    <text for="nonemergency">Non-Emergency</text>
                    <input name = "visit_type" type="checkbox" id="appointment">
                    <text for="appointment">Appointment</text><br>
                    <input name = "visit_type" type="checkbox" id="labor">
                    <text for="labor">Labor</text>
                    <input name = "visit_type" type="checkbox" id="visitation">
                    <text for="visitation">Visitation</text><br>
                <label>Sex:</label><br>
                <input name= "sex" type="radio" id="female">
                <text for="female">Female</text>
                <input name= "sex" type="radio" id="male">
                <text for="male">Male</text><br>
                <label>Insurance:</label><br>
                <input name = "insurance" type="radio" id="I-yes">
                <text for="I-yes">Yes</text>
                <input name = "insurance" type="radio" id="I-no">
                <text for="I-no">No</text><br>
                <label>Allergies:</label><br>
                <input name = "allergies" type="radio" id="A-no">
                <text for="A-no">No</text>
                <input name = "allergies" type="radio" id="A-yes">
                <text for="A-yes">Yes</text><br>
                <label for="allergies">If Yes, Please Specify: </label>
                <textarea id="allergies" name = "allergiestext" rows="3" cols="50"></textarea><br>
                <label for="rate">Rate your Health [1-10]:</label><br>
                <input name = "rate" id="rate" type="range" min="0" max="10" value="0">
                <div class="form-buttons">
                    <button type="reset" class="graybutton">Clear and Start Over</button>
                    <button type="submit" class="pinkbutton">Submit</button>
                </div>   
            </form>
        </main>
        <footer> 
            <div><p>Space City Medical<br>4827 Hollow Creek Lane <br>Sugar Land,TX 77479</p></div>
            <div><button>Contact Info</button></div>
            <div>
                <a href="#">Facebook</a>
                <a href="#">Twitter</a>
                <a href="#">Instagram</a>
            </div>
        </footer>
    </body>
    
</html>
